00000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="766.7813" x="21" y="634.1621">System calculates occupancy percentage\n(hours occupied / total schedulable hours &#215; 100)\nand total number of booked slots</text><rect fill="#FEFEFE" height="75.875" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:0.5;" width="332.1289" x="238.3262" y="666.9922"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="312.1289" x="248.3262" y="688.1309">System displays timetable with utilization statistics:</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="180.5566" x="248.3262" y="702.0996">- Percentage of time occupied</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="157.9043" x="248.3262" y="716.0684">- Total scheduled sessions</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="119.7949" x="248.3262" y="730.0371">- Breakdown by day</text><rect fill="#FEFEFE" height="33.9688" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:0.5;" width="293.6738" x="257.5537" y="762.8672"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="273.6738" x="267.5537" y="784.0059">Actor reviews statistics to assess room usage</text><rect fill="#FEFEFE" height="33.9688" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:0.5;" width="246.9629" x="817.7813" y="395.2422"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="226.9629" x="827.7813" y="416.3809">System shows empty room dropdown</text><rect fill="#FEFEFE" height="33.9688" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:0.5;" width="223.6953" x="829.415" y="449.2109"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="203.6953" x="839.415" y="470.3496">Actor selects a different semester</text><ellipse cx="9