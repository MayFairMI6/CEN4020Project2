;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="546.5449" x="121.4766" y="470.4824">System retrieves all classes for the selected instructor\nand builds a weekly timetable grid</text><rect fill="#ADD8E6" height="61.9063" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:0.5;" width="767.498" x="11" y="503.3125"/><text fill="#000000" font-family="Arial" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="19.2773" x="21" y="524.4512">ref</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="268.1602" x="44.0918" y="524.4512">UC_CONFLICT &#8212; Detect Scheduling Conflicts</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="440.7012" x="21" y="538.4199">&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="747.498" x="21" y="552.3887">System checks for overlapping class times on the same day\n(excluding same-CRN duplicates and cross-listed UG/GR pairs)</text><polygon fill="#FEFEFE" points="341.8813,585.2188,447.6167,585.2188,459.6167,597.2188,447.6167,609.2188,341.8813,609.2188,329.8813,597.2188,341.8813,585.2188" style="stroke:#444444;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="105.7354" x="341.8813" y="