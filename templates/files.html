<!DOCTYPE html>
<html>
<head>
    <title>Uploaded Excel Files</title>
</head>
<body>
    <h2>Uploaded Excel Files</h2>
    <ul>
    {% for file in files %}
        <li>
            {{ file }}
            <a href="{{ url_for('file_routes.view_excel', filename=file) }}">[View]</a>
            <a href="{{ url_for('file_routes.download_excel', filename=file) }}">[Download]</a>

        </li>
    {% endfor %}
    </ul>
    <a href="/">Back to Home</a>
</body>
</html>
